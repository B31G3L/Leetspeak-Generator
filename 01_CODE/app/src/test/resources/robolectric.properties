# src/test/resources/robolectric.properties
# Robolectric Konfiguration für Android Unit Tests

# SDK Version für Tests
sdk=33

# Standard Application Klasse
application=android.app.Application

# Zeitzone für konsistente Tests
timezone=UTC

# Qualifiers für verschiedene Konfigurationen
qualifiers=en-port-hdpi

# Schatten-Pakete (falls benötigt)
shadows=

# Instrumentation für Tests
instrumentedPackages=

# Maven Repository (falls offline)
# mavenRepositoryId=central
# mavenRepositoryUrl=https://repo1.maven.org/maven2