# .github/workflows/android-tests.yml
name: Android CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean and Build
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon --stacktrace
        continue-on-error: true   # Lint-Warnings dürfen den Build nicht brechen

      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Android Test Results
          path: |
            **/build/test-results/testDebugUnitTest/*.xml
            **/build/test-results/**/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Results and Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-and-reports
          path: |
            **/build/test-results/**/*
            **/build/reports/**/*
            **/build/outputs/**/*
          if-no-files-found: warn
          retention-days: 30

      - name: Code Coverage
        if: success()
        run: ./gradlew jacocoTestReport --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: |
            ./app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            ./app/build/reports/jacoco/**/jacocoTestReport.xml
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}