# .github/workflows/android-tests.yml
name: Android CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Debug - List project structure
      run: |
        echo "=== Project Structure ==="
        find . -name "*.gradle*" -type f | head -10
        ls -la
        if [ -d "app" ]; then
          echo "=== App module found ==="
          ls -la app/
        fi
      
    - name: Clean and Build
      run: ./gradlew clean build --no-daemon --stacktrace
      continue-on-error: true
      
    - name: Run Unit Tests with detailed output
      run: ./gradlew testDebugUnitTest --no-daemon --stacktrace --info
      continue-on-error: true
      
    - name: Debug - Check for test results
      run: |
        echo "=== Searching for test results ==="
        find . -name "*.xml" -path "*/test-results/*" -type f || echo "No XML test result files found"
        find . -name "*.html" -path "*/reports/*" -type f || echo "No HTML report files found"
        find . -type d -name "test-results" || echo "No test-results directories found"
        find . -type d -name "reports" || echo "No reports directories found"
        
        echo "=== Build directory contents ==="
        if [ -d "app/build" ]; then
          find app/build -type f -name "*.xml" | head -10 || echo "No XML files in app/build"
          ls -la app/build/ || echo "Cannot list app/build"
        fi
        
        echo "=== All build directories ==="
        find . -type d -name "build" | head -5
      
    - name: Run Lint
      run: ./gradlew lintDebug --no-daemon --stacktrace
      continue-on-error: true
      
    - name: Generate Test Report (if test results exist)
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Android Test Results
        path: |
          **/build/test-results/testDebugUnitTest/*.xml
          **/build/test-results/**/TEST-*.xml
        reporter: java-junit
        fail-on-error: false
        
    - name: Upload Test Results and Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-and-reports
        path: |
          **/build/test-results/**/*
          **/build/reports/**/*
          **/build/outputs/**/*
        if-no-files-found: warn
        retention-days: 30
          
    - name: Code Coverage (if tests passed)
      run: ./gradlew jacocoTestReport --no-daemon --stacktrace
      continue-on-error: true
      
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: |
          ./app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          ./app/build/reports/jacoco/**/jacocoTestReport.xml
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Final Debug - Show build logs
      if: failure()
      run: |
        echo "=== Final debugging information ==="
        echo "Gradle daemon status:"
        ./gradlew --status || echo "Could not get Gradle status"
        
        echo "=== Last 50 lines of any log files ==="
        find . -name "*.log" -type f -exec echo "=== {} ===" \; -exec tail -50 {} \; || echo "No log files found"